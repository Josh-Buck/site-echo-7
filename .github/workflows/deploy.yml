name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

env:
  GODOT_VERSION: 4.6
  GODOT_STATUS: stable

jobs:
  build:
    name: Build web export
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache Godot binary + templates
        id: cache-godot
        uses: actions/cache@v4
        with:
          path: |
            ~/godot-bin
            ~/.local/share/godot/export_templates
          key: godot-${{ env.GODOT_VERSION }}-${{ env.GODOT_STATUS }}

      - name: Install Godot ${{ env.GODOT_VERSION }}-${{ env.GODOT_STATUS }}
        if: steps.cache-godot.outputs.cache-hit != 'true'
        run: |
          set -e
          mkdir -p ~/godot-bin
          curl -L -o /tmp/godot.zip \
            "https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}-${GODOT_STATUS}/Godot_v${GODOT_VERSION}-${GODOT_STATUS}_linux.x86_64.zip"
          unzip -q /tmp/godot.zip -d /tmp/godot-extract
          mv /tmp/godot-extract/Godot_v${GODOT_VERSION}-${GODOT_STATUS}_linux.x86_64 ~/godot-bin/godot
          chmod +x ~/godot-bin/godot

          curl -L -o /tmp/templates.tpz \
            "https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}-${GODOT_STATUS}/Godot_v${GODOT_VERSION}-${GODOT_STATUS}_export_templates.tpz"
          mkdir -p ~/.local/share/godot/export_templates/${GODOT_VERSION}.${GODOT_STATUS}
          unzip -q /tmp/templates.tpz -d /tmp/templates-extract
          mv /tmp/templates-extract/templates/* ~/.local/share/godot/export_templates/${GODOT_VERSION}.${GODOT_STATUS}/

      - name: Add Godot to PATH
        run: echo "$HOME/godot-bin" >> $GITHUB_PATH

      - name: Verify Godot
        run: godot --version --headless

      - name: Import project (first-pass resource generation)
        run: |
          # Godot returns nonzero on --import when there's nothing to run; that's expected.
          godot --headless --import || true

      - name: Export web build
        run: |
          set -e
          mkdir -p build/web
          godot --headless --export-release "Web" build/web/index.html
          ls -la build/web

      - name: Add .nojekyll safety belt
        run: touch build/web/.nojekyll

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: build/web

  deploy:
    name: Deploy
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
